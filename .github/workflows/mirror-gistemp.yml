name: mirror-gistemp

on:
  schedule:
    - cron: "30 12 * * *"     # daily 12:30 UTC (GitHub may delay under load)
  workflow_dispatch:           # adds a manual "Run workflow" button

permissions:
  contents: write              # lets the job commit + push

concurrency:
  group: mirror-gistemp
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Fetch GISTEMP table from NASA GISS
        run: |
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://data.giss.nasa.gov/gistemp/tabledata_v4/GLB.Ts+dSST.txt" \
            -o "GLB.Ts+dSST.txt"
          test -s "GLB.Ts+dSST.txt"     # fail loudly if the download is empty

      - name: Heartbeat (keeps the daily schedule from auto-disabling)
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > synced_at.txt

      - name: Commit + push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "mirror GISTEMP $(cat synced_at.txt)"
          git push
